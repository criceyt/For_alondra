<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALONDRA // MY ROCKSTAR</title>
    
    <!-- Fuentes de Alta Gama -->
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Montserrat:wght@100;400;900&family=Birthstone&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --pink-neon: #ff007f;
            --pink-soft: #ff85a1;
            --black-matte: #0a0a0a;
            --glass: rgba(10, 10, 10, 0.7);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--black-matte);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Evita scroll innecesario en móvil */
        }

        /* Canvas para las partículas */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Fondo con gradiente animado */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #200510 0%, #050505 100%);
            z-index: 0;
        }

        /* Contenedor Principal */
        .main-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* Título Estilo Gótico-Rock Moderno */
        .name-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 5rem;
            color: var(--pink-neon);
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            margin: 0;
            cursor: pointer;
        }

        .cursive-name {
            font-family: 'Birthstone', cursive;
            font-size: 3.5rem;
            color: white;
            margin-top: -30px;
            display: block;
        }

        /* Tarjeta de Mensaje */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 127, 0.3);
            border-radius: 25px;
            padding: 25px;
            margin-top: 30px;
            max-width: 320px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(30px);
        }

        .glass-card p {
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 300;
            color: #efefef;
        }

        .highlight {
            color: var(--pink-neon);
            font-weight: 900;
        }

        /* Botón de "Curación" */
        .magic-btn {
            background: none;
            border: 2px solid var(--pink-neon);
            color: var(--pink-neon);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-top: 25px;
            transition: 0.4s;
            cursor: pointer;
            text-transform: uppercase;
        }

        .magic-btn:active {
            transform: scale(0.9);
            background: var(--pink-neon);
            color: white;
        }

        /* Decoración de esquinas */
        .corner {
            position: fixed;
            width: 80px; height: 80px;
            border-color: var(--pink-neon);
            border-style: solid;
            opacity: 0.3;
            z-index: 5;
        }
        .top-left { top: 20px; left: 20px; border-width: 2px 0 0 2px; border-radius: 15px 0 0 0; }
        .bottom-right { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; border-radius: 0 0 15px 0; }

        /* Guiño a su estatura */
        .height-note {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="top-left corner"></div>
    <div class="bottom-right corner"></div>

    <div class="main-wrapper">
        <div id="hero-text">
            <h1 class="name-title">Alondra</h1>
            <span class="cursive-name">Rock & Roses</span>
        </div>

        <div class="glass-card" id="card">
            <p>
                Sé que hoy el cielo está un poco oscuro, pero incluso el mejor <span class="highlight">rock n' roll</span> nace de la melancolía.
                <br><br>
                Mides <span class="highlight">1,50m</span>, pero tu esencia llena cualquier habitación. No dejes que nada apague ese brillo negro y rosa que te hace única.
            </p>
            <button class="magic-btn" onclick="triggerMagic()">Subir el ánimo</button>
            <div class="height-note">Pequeña en estatura, gigante en estilo.</div>
        </div>
    </div>

    <script>
        // --- MOTOR DE PARTÍCULAS (Corazones, Notas, Rock) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const emojis = ['❤️', '🎸', '🎵', '⚡', '✨', '🖤'];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 100;
                this.size = Math.random() * 20 + 10;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.char = emojis[Math.floor(Math.random() * emojis.length)];
                this.opacity = Math.random() * 0.5 + 0.2;
                this.angle = Math.random() * Math.PI * 2;
            }
            update() {
                this.y -= this.speedY;
                this.angle += 0.02;
                if (this.y < -50) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.sin(this.angle) * 0.2);
                ctx.fillText(this.char, 0, 0);
                ctx.restore();
            }
        }

        function createParticles() {
            for (let i = 0; i < 25; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // --- ANIMACIONES DE ENTRADA ---
        window.onload = () => {
            initCanvas();
            createParticles();
            animate();

            gsap.from("#hero-text", { duration: 2, y: -50, opacity: 0, ease: "expo.out" });
            gsap.to("#card", { duration: 1.5, opacity: 1, y: 0, delay: 0.8, ease: "power4.out" });
        };

        // --- MAGIA AL HACER CLIC ---
        function triggerMagic() {
            // Explosión de color
            gsap.to(".bg-gradient", { duration: 0.5, background: "radial-gradient(circle at center, #450a22 0%, #050505 100%)", yoyo: true, repeat: 1 });
            
            // Hacer que las partículas suban rápido
            particles.forEach(p => {
                p.speedY *= 5;
                setTimeout(() => p.speedY /= 5, 2000);
            });

            const btn = document.querySelector('.magic-btn');
            btn.innerHTML = "¡TE QUIERO FELIZ! 🤘";
            
            // Feedback sutil
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        window.onresize = initCanvas;
    </script>
</body>
</html>
